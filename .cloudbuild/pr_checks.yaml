steps:
  - name: "python:3.12-slim"
    id: security-scan
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        pip install --quiet uv==0.8.13 --user
        export PATH="$HOME/.local/bin:$PATH"
        uv run python scripts/security_scanner.py

  - name: "python:3.12-slim"
    id: backend-trust-gate
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        pip install --quiet uv==0.8.13 --user
        export PATH="$HOME/.local/bin:$PATH"
        uv sync --locked
        uv run python scripts/verify/check_migrations.py
        uv run python scripts/verify/validate_workflow_templates.py
        uv run python scripts/verify/validate_journey_workflow_references.py
        uv run pytest tests/unit/test_product_truth_guards.py tests/unit/test_workflow_execution_contracts.py tests/unit/test_workflow_template_tool_resolution.py -q

  - name: "node:20"
    id: frontend-trust-gate
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        cd frontend
        npm ci
        npm test -- src/__tests__/services/api.test.ts --run --pool=threads --maxWorkers=1
        CI=1 NEXT_TELEMETRY_DISABLED=1 NEXT_PUBLIC_API_URL=http://localhost:8000 NEXT_PUBLIC_SUPABASE_URL=https://example.supabase.co NEXT_PUBLIC_SUPABASE_ANON_KEY=sb_publishable_test_key npm run build

logsBucket: gs://${PROJECT_ID}-pikar-ai-logs/build-logs
options:
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
