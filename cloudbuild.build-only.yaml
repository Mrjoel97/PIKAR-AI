# Cloud Build pipeline used by scripts/deploy/cloud_run_job.ps1 for FIRST-TIME
# WorkflowWorker deploys.
#
# Builds + pushes the worker image only — the Cloud Run Job creation and
# Cloud Scheduler trigger setup happen in the calling script after this
# pipeline finishes successfully.
#
# Subsequent deploys (push-to-main automation) use the full cloudbuild.yaml
# which additionally runs `gcloud run jobs update` after build + push.

substitutions:
  _REGION: us-central1
  _PROJECT_ID: pikar-ai-project
  _REPOSITORY: cloud-run-source-deploy
  _JOB_NAME: workflow-worker
  _IMAGE_TAG: latest

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
  env:
    - DOCKER_BUILDKIT=1

timeout: 1800s

steps:
  - id: build-worker
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        IMAGE="${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/${_JOB_NAME}"
        docker pull "$${IMAGE}:latest" || true
        docker build \
          --file Dockerfile.worker \
          --tag "$${IMAGE}:${_IMAGE_TAG}" \
          --tag "$${IMAGE}:latest" \
          --cache-from "$${IMAGE}:latest" \
          --build-arg COMMIT_SHA=${_IMAGE_TAG} \
          .

  - id: push-worker
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        IMAGE="${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/${_JOB_NAME}"
        docker push "$${IMAGE}:${_IMAGE_TAG}"
        docker push "$${IMAGE}:latest"
    waitFor: ["build-worker"]

images:
  - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/${_JOB_NAME}:${_IMAGE_TAG}
  - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/${_JOB_NAME}:latest
