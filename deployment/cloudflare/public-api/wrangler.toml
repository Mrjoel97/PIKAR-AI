name = "pikar-public-api"
main = "src/index.ts"
compatibility_date = "2026-04-14"
workers_dev = false

[observability]
enabled = true

[vars]
ALLOWED_ORIGINS = "https://pikar-ai.com,https://www.pikar-ai.com,https://pikar-ai.vercel.app"
ALLOW_ALL_FEATURES_FOR_TESTING = "true"

[[routes]]
pattern = "public-api.pikar-ai.com"
custom_domain = true
