name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  workflow-template-validation:
    name: Validate Workflow Templates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Validate workflow templates
        run: python scripts/verify/validate_workflow_templates.py

      - name: Validate journey workflow references
        run: python scripts/verify/validate_journey_workflow_references.py
