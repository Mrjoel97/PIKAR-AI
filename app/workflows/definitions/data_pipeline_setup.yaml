name: Data Pipeline Setup
description: Design, build, and validate a data pipeline from source to destination
category: data
phases:
  - name: Requirements
    steps:
      - name: Define Pipeline Requirements
        tool: save_content
        description: Document source systems, data schema, transformation rules, SLAs, and destination
        required_approval: true
  - name: Design
    steps:
      - name: Design Pipeline Architecture
        tool: save_content
        description: Map extraction, transformation, and loading steps with error handling and monitoring
        required_approval: true
  - name: Development
    steps:
      - name: Build Pipeline Components
        tool: create_task
        description: Create tasks for each pipeline component — connectors, transforms, validation, and sink
        required_approval: false
  - name: Testing
    steps:
      - name: Test Pipeline
        tool: create_task
        description: Run test loads with sample data, verify output accuracy, and stress test throughput
        required_approval: false
  - name: Deployment
    steps:
      - name: Deploy to Production
        tool: create_task
        description: Schedule production deployment, configure monitoring alerts, and document runbook
        required_approval: true
  - name: Monitoring
    steps:
      - name: Set Up Pipeline Monitoring
        tool: track_event
        description: Configure pipeline health monitoring, latency tracking, and failure alerting
        required_approval: false
